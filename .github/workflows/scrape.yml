name: FlightRadar24 Scraper

on:
  # ── Trigger manual dari GitHub UI ──────────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: 'Data yang diambil'
        required: true
        default: 'yesterday'
        type: choice
        options:
          - yesterday   # H-1 ← default
          - today       # Hari ini

  # ── Otomatis setiap hari jam 05.00 WIB (22.00 UTC malam sebelumnya), ambil data H-1 ─────
  schedule:
    - cron: '0 22 * * *'

permissions:
  contents: write   # untuk commit & push hasil ke repo
  issues: write     # untuk buat issue notifikasi jika gagal

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Run normal ~10 menit. Beri ruang untuk retry 3x (~30 menit) + commit,
    # supaya job tidak dibatalkan di tengah retry dan notifikasi tetap terkirim.
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper (retry 3x jika gagal)
        run: |
          for i in 1 2 3; do
            echo "=== Attempt $i ==="
            python scrape_board.py ${{ github.event.inputs.mode || 'yesterday' }} && break
            if [ $i -lt 3 ]; then
              echo "Gagal, coba lagi dalam 30 detik..."
              sleep 30
            else
              echo "Gagal setelah 3x percobaan"
              exit 1
            fi
          done

      - name: Commit & push hasil ke repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add excel csv
          git diff --cached --quiet || git commit -m "data: $(ls -t excel/*.xlsx | head -1 | xargs basename | sed 's/.xlsx//')"
          git push

      # ── Notifikasi otomatis via GitHub Issue jika gagal ─────────────────
      # cancelled() ikut ditangkap: job yang kena timeout berstatus "cancelled",
      # bukan "failure", sehingga dulu lolos tanpa notifikasi.
      - name: Buat issue jika gagal
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toLocaleDateString('id-ID', {
              timeZone: 'Asia/Jakarta',
              day: '2-digit', month: 'long', year: 'numeric'
            });
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Scraper gagal — ${date}`,
              body: [
                '## Scraper FlightRadar24 Gagal',
                '',
                `**Tanggal:** ${date}`,
                `**Run:** [Lihat log di sini](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### Kemungkinan penyebab:',
                '- FlightRadar24 memblokir sementara (anti-bot)',
                '- Timeout saat membuka halaman',
                '- Job kena batas waktu (status "cancelled") — retry 3x kelamaan',
                '- Perubahan struktur halaman FR24',
                '',
                '### Solusi:',
                '1. Klik link run di atas untuk lihat detail error',
                '2. Coba trigger manual: **Actions → Run workflow**',
                '3. Kalau masih gagal, ping @haris1508',
              ].join('\n'),
            });
