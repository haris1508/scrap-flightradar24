name: FlightRadar24 Scraper

on:
  # ── Trigger manual dari GitHub UI ──────────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: 'Data yang diambil'
        required: true
        default: 'yesterday'
        type: choice
        options:
          - yesterday   # H-1 ← default
          - today       # Hari ini

  # ── Otomatis setiap hari jam 08.00 WIB (01.00 UTC), ambil data H-1 ─────
  schedule:
    - cron: '0 1 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scrape_board.py ${{ github.event.inputs.mode || 'yesterday' }}

      - name: Commit & push hasil ke repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.xlsx *.json
          git diff --cached --quiet || git commit -m "data: $(ls *.xlsx | head -1 | sed 's/.xlsx//')"
          git push
